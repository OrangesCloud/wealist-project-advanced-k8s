# values.yaml for noti-service
# Inherits from charts/microservice-chart

replicaCount: 1

image:
  repository: noti-service
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: "noti-service"
fullnameOverride: "noti-service"

service:
  type: ClusterIP
  port: 8002
  targetPort: 8002

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

envFrom:
  - configMapRef:
      name: wealist-shared-config
  - secretRef:
      name: wealist-shared-secrets

env:
  - name: DATABASE_URL
    value: "postgresql://noti_service:noti_service_password@postgres:5432/wealist_noti_db?sslmode=disable"

livenessProbe:
  httpGet:
    path: /health
    port: 8002
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: 8002
  initialDelaySeconds: 5
  periodSeconds: 5

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: local.wealist.co.kr
      paths:
        - path: /api/notifications
          pathType: Prefix
