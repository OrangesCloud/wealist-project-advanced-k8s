# values.yaml for chat-service
# Inherits from charts/microservice-chart

replicaCount: 1

image:
  repository: chat-service
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: "chat-service"
fullnameOverride: "chat-service"

service:
  type: ClusterIP
  port: 8001
  targetPort: 8001

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

envFrom:
  - configMapRef:
      name: wealist-shared-config
  - secretRef:
      name: wealist-shared-secrets

env:
  - name: DATABASE_URL
    value: "postgresql://chat_service:chat_service_password@postgres:5432/wealist_chat_db?sslmode=disable"

livenessProbe:
  httpGet:
    path: /health/live
    port: 8001
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8001
  initialDelaySeconds: 5
  periodSeconds: 5

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: local.wealist.co.kr
      paths:
        - path: /api/chats
          pathType: Prefix
