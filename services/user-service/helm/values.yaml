# values.yaml for user-service
# Inherits from charts/microservice-chart

replicaCount: 1

image:
  repository: user-service
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: "user-service"
fullnameOverride: "user-service"

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

envFrom:
  - configMapRef:
      name: wealist-shared-config
  - configMapRef:
      name: user-service-config
  - secretRef:
      name: wealist-shared-secrets

env:
  - name: DATABASE_URL
    value: "postgresql://user_service:user_service_password@postgres:5432/wealist_user_db?sslmode=disable"

livenessProbe:
  httpGet:
    path: /api/health
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /api/ready
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 5

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: local.wealist.co.kr
      paths:
        - path: /api/users
          pathType: Prefix
