# =============================================================================
# Secrets Template (localhost 전용 - ESO 미사용 시)
# =============================================================================
#
# ⚠️  dev/prod 환경: 이 파일 사용하지 않음!
#     → AWS SSM Parameter Store + External Secrets Operator 사용
#     → terraform/dev-environment/secrets.tf 참조
#
# localhost 환경 (USE_AWS_SSM=false):
#   1. cp secrets.example.yaml secrets.yaml
#   2. 실제 값으로 수정
#   3. make helm-install-all ENV=localhost
#
# localhost 환경 (USE_AWS_SSM=true):
#   → 이 파일 필요 없음, ESO가 SSM에서 자동 동기화
#
# =============================================================================

shared:
  secrets:
    # -------------------------------------------------------------------------
    # Google OAuth2 Credentials
    # -------------------------------------------------------------------------
    # Google Cloud Console에서 발급:
    # https://console.cloud.google.com/apis/credentials
    #
    GOOGLE_CLIENT_ID: "your-client-id.apps.googleusercontent.com"
    GOOGLE_CLIENT_SECRET: "your-client-secret"

    # -------------------------------------------------------------------------
    # JWT Secret
    # -------------------------------------------------------------------------
    # Generate with: openssl rand -base64 32
    JWT_SECRET: "local-dev-jwt-secret-key-must-be-at-least-64-characters-long-for-hs512-algorithm"

    # -------------------------------------------------------------------------
    # Database Credentials
    # -------------------------------------------------------------------------
    DB_PASSWORD: "postgres"

    # -------------------------------------------------------------------------
    # Redis Password
    # -------------------------------------------------------------------------
    REDIS_PASSWORD: ""

    # -------------------------------------------------------------------------
    # S3/MinIO Credentials
    # -------------------------------------------------------------------------
    S3_ACCESS_KEY: "minioadmin"
    S3_SECRET_KEY: "minioadmin"

    # -------------------------------------------------------------------------
    # Internal API Key (서비스 간 인증)
    # -------------------------------------------------------------------------
    INTERNAL_API_KEY: "local-internal-api-key"
