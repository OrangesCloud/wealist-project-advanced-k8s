{{/*
=============================================================================
Shared Secret - 서비스들이 공유하는 시크릿
=============================================================================
dev/prod 환경: External Secrets Operator가 AWS SSM에서 자동 생성
  → 이 템플릿은 건너뜀 (lookup으로 이미 존재하면 생성 안 함)

localhost 환경 (USE_AWS_SSM=false): 이 템플릿이 secrets.yaml 값으로 생성
localhost 환경 (USE_AWS_SSM=true): ESO가 생성, 이 템플릿 건너뜀
=============================================================================
*/}}
{{- if not (lookup "v1" "Secret" .Values.global.namespace "wealist-shared-secret") }}
{{- if .Values.shared.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: wealist-shared-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "wealist-infrastructure.labels" . | nindent 4 }}
    app.kubernetes.io/component: shared-secret
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Database Credentials
  DB_PASSWORD: {{ .Values.shared.secrets.DB_PASSWORD | default "" | quote }}
  REDIS_PASSWORD: {{ .Values.shared.secrets.REDIS_PASSWORD | default "" | quote }}

  # S3/MinIO Credentials
  S3_ACCESS_KEY: {{ .Values.shared.secrets.S3_ACCESS_KEY | default "" | quote }}
  S3_SECRET_KEY: {{ .Values.shared.secrets.S3_SECRET_KEY | default "" | quote }}

  # Security
  INTERNAL_API_KEY: {{ .Values.shared.secrets.INTERNAL_API_KEY | default "" | quote }}
  JWT_SECRET: {{ .Values.shared.secrets.JWT_SECRET | default "" | quote }}

  # OAuth2 Credentials
  GOOGLE_CLIENT_ID: {{ .Values.shared.secrets.GOOGLE_CLIENT_ID | default "" | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.shared.secrets.GOOGLE_CLIENT_SECRET | default "" | quote }}
{{- end }}
{{- end }}
