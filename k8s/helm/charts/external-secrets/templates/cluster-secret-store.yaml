{{- /*
ClusterSecretStore for AWS SSM Parameter Store
This resource is cluster-wide and can be referenced from any namespace.
*/ -}}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.secretStore.name }}
spec:
  provider:
    aws:
      service: ParameterStore
      region: {{ .Values.aws.region }}
      {{- if eq .Values.aws.authMethod "accessKey" }}
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: {{ .Values.aws.accessKeySecret.name }}
            namespace: {{ .Values.global.namespace }}
            key: {{ .Values.aws.accessKeySecret.accessKeyId }}
          secretAccessKeySecretRef:
            name: {{ .Values.aws.accessKeySecret.name }}
            namespace: {{ .Values.global.namespace }}
            key: {{ .Values.aws.accessKeySecret.secretAccessKey }}
      {{- end }}
      {{- /* IRSA 사용 시 auth 섹션 생략 - ServiceAccount의 IAM Role 사용 */}}
