{{- /*
ExternalSecret for wealist-shared-secret
Syncs AWS SSM Parameters to K8s Secret that services reference.
*/ -}}
{{- if .Values.externalSecrets.wealistSharedSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.wealistSharedSecret.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.wealistSharedSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secretStore.name }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecrets.wealistSharedSecret.name }}
    creationPolicy: Owner
  data:
    # -------------------------------------------------------------------------
    # Google OAuth Credentials
    # -------------------------------------------------------------------------
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: {{ .Values.ssmParameters.googleOAuth.clientId }}
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.ssmParameters.googleOAuth.clientSecret }}

    # -------------------------------------------------------------------------
    # JWT Secret
    # -------------------------------------------------------------------------
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.ssmParameters.jwt.secret }}

    # -------------------------------------------------------------------------
    # Database Password (shared for all services)
    # -------------------------------------------------------------------------
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.ssmParameters.database.userPassword }}

    # -------------------------------------------------------------------------
    # Redis Password
    # -------------------------------------------------------------------------
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: {{ .Values.ssmParameters.redis.password }}

    # -------------------------------------------------------------------------
    # S3/MinIO Credentials
    # -------------------------------------------------------------------------
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: {{ .Values.ssmParameters.minio.accessKey }}
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: {{ .Values.ssmParameters.minio.secretKey }}

    # -------------------------------------------------------------------------
    # Internal API Key
    # -------------------------------------------------------------------------
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: {{ .Values.ssmParameters.internal.apiKey }}
{{- end }}
