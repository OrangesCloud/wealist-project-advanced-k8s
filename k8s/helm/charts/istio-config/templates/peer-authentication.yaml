{{- if and .Values.istio.enabled .Values.istio.mtls.enabled }}
# =============================================================================
# 네임스페이스 기본 mTLS 정책
# =============================================================================
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: {{ include "istio-config.namespace" . }}
  labels:
    {{- include "istio-config.labels" . | nindent 4 }}
spec:
  mtls:
    mode: {{ .Values.istio.mtls.mode }}
---
# =============================================================================
# PostgreSQL - mTLS 비활성화 (자체 프로토콜 사용)
# =============================================================================
{{- if .Values.istio.database.postgres.disableMtls }}
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: postgres-disable-mtls
  namespace: {{ include "istio-config.namespace" . }}
  labels:
    {{- include "istio-config.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: postgres
  mtls:
    mode: DISABLE
{{- end }}
---
# =============================================================================
# Redis - mTLS 비활성화 (자체 프로토콜 사용)
# =============================================================================
{{- if .Values.istio.database.redis.disableMtls }}
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: redis-disable-mtls
  namespace: {{ include "istio-config.namespace" . }}
  labels:
    {{- include "istio-config.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: redis
  mtls:
    mode: DISABLE
{{- end }}
{{- end }}
