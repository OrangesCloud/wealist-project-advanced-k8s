# Default values for istio-config
global:
  namespace: wealist-localhost

istio:
  enabled: true
  namespace: wealist-localhost

  httpRoute:
    enabled: true
    gatewayRef:
      name: istio-ingressgateway
      namespace: istio-system
    hosts:
      - "localhost"
      - "*"
    frontend:
      enabled: true
    monitoring:
      enabled: true
      grafana:
        prefix: /monitoring/grafana
        host: grafana
        port: 3000
      prometheus:
        prefix: /monitoring/prometheus
        host: prometheus
        port: 9090
      loki:
        prefix: /monitoring/loki
        host: loki
        port: 3100
      # Istio Observability (istio-system 네임스페이스, setup 시 자동 설치됨)
      kiali:
        enabled: true
        prefix: /monitoring/kiali
        host: kiali
        port: 20001
        namespace: istio-system
      jaeger:
        enabled: true
        prefix: /monitoring/jaeger
        host: tracing
        port: 80
        namespace: istio-system

  mtls:
    enabled: true
    mode: PERMISSIVE

  database:
    postgres:
      disableMtls: true
    redis:
      disableMtls: true

  destinationRules:
    enabled: true
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 10s
      http:
        h2UpgradePolicy: DO_NOT_UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
        maxRequestsPerConnection: 100
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 5
      consecutiveGatewayErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30

  authorizationPolicy:
    enabled: true
    denyAll: false  # 환경별 오버라이드: dev/prod는 true (Zero Trust)

  # -----------------------------------------------------------------------------
  # Service-to-Service Authorization (ServiceAccount-based)
  # Defines which services can call which other services
  # L7 정책: Waypoint에서 적용 (targetRef 사용)
  # -----------------------------------------------------------------------------
  serviceAuthorization:
    enabled: false  # 환경별 오버라이드: dev/prod는 true
    rules:
      # user-service: receives calls from multiple services for workspace validation
      user-service:
        allowedCallers:
          - board-service
          - chat-service
          - storage-service
          - video-service
        allowedPaths:
          - /api/workspaces/*/validate-member/*
          - /api/users/*
          - /api/profiles/*
          - /health/*
          - /internal/*

      # auth-service: JWT validation and JWKS endpoint
      auth-service:
        allowedCallers:
          - board-service  # WebSocket token validation
        allowedPaths:
          - /api/auth/validate
          - /.well-known/*
          - /actuator/health/*

      # noti-service: receives notifications from board and chat
      noti-service:
        allowedCallers:
          - board-service
          - chat-service
        allowedPaths:
          - /api/*
          - /internal/*
          - /sse/*
          - /health/*

      # board-service: gateway only (no internal callers)
      board-service:
        allowedCallers: []
        allowedPaths:
          - /api/*
          - /health/*
          - /internal/*

      # chat-service: gateway only
      chat-service:
        allowedCallers: []
        allowedPaths:
          - /api/*
          - /ws/*
          - /health/*

      # storage-service: gateway only
      storage-service:
        allowedCallers: []
        allowedPaths:
          - /api/*
          - /health/*

      # video-service: gateway only
      video-service:
        allowedCallers: []
        allowedPaths:
          - /api/*
          - /health/*

      # frontend: gateway only
      frontend:
        allowedCallers: []
        allowedPaths:
          - /*

  # -----------------------------------------------------------------------------
  # JWT Authentication (RS256 JWKS based)
  # auth-service exposes /.well-known/jwks.json endpoint
  # -----------------------------------------------------------------------------
  jwtAuth:
    enabled: false  # 환경별 오버라이드: dev/prod는 true
    issuer: wealist-auth-service
    jwksUri: "http://auth-service:8080/.well-known/jwks.json"
    # Public paths that don't require JWT
    excludePaths:
      - /health/*
      - /actuator/health/*
      - /.well-known/*
      - /oauth2/*
      - /login/oauth2/*
      - /api/auth/login
      - /api/auth/register
      - /api/auth/refresh
      - /api/auth/oauth2/*
      - /swagger-ui/*
      - /v3/api-docs/*
      - /monitoring/*
      - /  # Frontend static files

  # -----------------------------------------------------------------------------
  # Telemetry Configuration (Tracing & Access Logging)
  # -----------------------------------------------------------------------------
  telemetry:
    tracing:
      enabled: false  # 환경별 오버라이드
      samplingPercentage: 100
    accessLogging:
      enabled: false  # 환경별 오버라이드

  ambient:
    enabled: true
    waypoint:
      enabled: true
      name: wealist-waypoint
